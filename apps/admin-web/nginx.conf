server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Never cache the runtime config so environment changes take effect on restart.
  location = /env.js {
    add_header Cache-Control "no-store";
  }

  # SPA fallback: client-side routes resolve to index.html.
  location / {
    try_files $uri /index.html;
  }
}
