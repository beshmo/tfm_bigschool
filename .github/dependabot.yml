version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'thursday'
      time: '08:00'
      timezone: 'Europe/Madrid'
    open-pull-requests-limit: 5
    groups:
      production-dependencies:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      development-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'thursday'
      time: '08:30'
      timezone: 'Europe/Madrid'
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: 'docker'
    directory: '/apps/api'
    schedule:
      interval: 'weekly'
      day: 'thursday'
      time: '09:00'
      timezone: 'Europe/Madrid'
    open-pull-requests-limit: 3
    groups:
      api-container-images:
        patterns:
          - '*'

  - package-ecosystem: 'docker'
    directory: '/apps/admin-web'
    schedule:
      interval: 'weekly'
      day: 'thursday'
      time: '09:00'
      timezone: 'Europe/Madrid'
    open-pull-requests-limit: 3
    groups:
      admin-web-container-images:
        patterns:
          - '*'

  - package-ecosystem: 'docker'
    directory: '/apps/demo-web'
    schedule:
      interval: 'weekly'
      day: 'thursday'
      time: '09:00'
      timezone: 'Europe/Madrid'
    open-pull-requests-limit: 3
    groups:
      demo-web-container-images:
        patterns:
          - '*'

  - package-ecosystem: 'docker-compose'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'thursday'
      time: '09:30'
      timezone: 'Europe/Madrid'
    open-pull-requests-limit: 3
    groups:
      compose-images:
        patterns:
          - '*'
