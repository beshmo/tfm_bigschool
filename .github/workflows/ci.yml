name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  PNPM_VERSION: 11.9.0
  DOCKERHUB_REPOSITORY: beshmo/okvns

jobs:
  quality:
    name: Quality, Tests, and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: okvns
          MYSQL_USER: okvns
          MYSQL_PASSWORD: okvns
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm test:e2e:install --with-deps

      - name: Run Playwright E2E
        run: pnpm test:e2e
        env:
          OKVNS_E2E_MYSQL_HOST: 127.0.0.1
          OKVNS_E2E_MYSQL_PORT: 3306
          OKVNS_E2E_MYSQL_DATABASE: okvns
          OKVNS_E2E_MYSQL_USER: okvns
          OKVNS_E2E_MYSQL_PASSWORD: okvns

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker-images:
    name: Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        image:
          - asset: api
            tag-prefix: okvns-api
            dockerfile: apps/api/Dockerfile
          - asset: admin-web
            tag-prefix: okvns-admin-web
            dockerfile: apps/admin-web/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.DOCKERHUB_REPOSITORY }}
          tags: |
            type=ref,event=branch,prefix=${{ matrix.image.tag-prefix }}-
            type=ref,event=pr,prefix=${{ matrix.image.tag-prefix }}-
            type=semver,pattern=${{ matrix.image.tag-prefix }}-{{version}}
            type=semver,pattern=${{ matrix.image.tag-prefix }}-{{major}}.{{minor}}
            type=sha,prefix=${{ matrix.image.tag-prefix }}-sha-

      - name: Login to Docker Hub
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
