apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.mysql.secretName }}
  namespace: {{ include "okvns.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ .Values.mysql.name }}
    app.kubernetes.io/part-of: {{ include "okvns.partOf" . }}
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: {{ .Values.mysql.credentials.rootPassword | quote }}
  MYSQL_USER: {{ .Values.mysql.credentials.user | quote }}
  MYSQL_PASSWORD: {{ .Values.mysql.credentials.password | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mysql.name }}
  namespace: {{ include "okvns.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ .Values.mysql.name }}
    app.kubernetes.io/part-of: {{ include "okvns.partOf" . }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ .Values.mysql.name }}
  ports:
    - name: mysql
      port: {{ .Values.mysql.service.port }}
      targetPort: mysql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.mysql.name }}
  namespace: {{ include "okvns.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ .Values.mysql.name }}
    app.kubernetes.io/part-of: {{ include "okvns.partOf" . }}
spec:
  serviceName: {{ .Values.mysql.name }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.mysql.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.mysql.name }}
        app.kubernetes.io/part-of: {{ include "okvns.partOf" . }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: mysql
          image: {{ include "okvns.mysqlImage" . }}
          imagePullPolicy: {{ .Values.mysql.image.pullPolicy }}
          ports:
            - name: mysql
              containerPort: {{ .Values.mysql.service.port }}
          env:
            - name: MYSQL_DATABASE
              value: {{ .Values.mysql.database | quote }}
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.secretName }}
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.secretName }}
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.secretName }}
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command: {{ .Values.mysql.livenessProbe.command | toJson }}
            initialDelaySeconds: {{ .Values.mysql.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.mysql.livenessProbe.periodSeconds }}
          readinessProbe:
            exec:
              command: {{ .Values.mysql.readinessProbe.command | toJson }}
            initialDelaySeconds: {{ .Values.mysql.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.mysql.readinessProbe.periodSeconds }}
          resources:
            requests:
              cpu: {{ .Values.mysql.resources.requests.cpu | quote }}
              memory: {{ .Values.mysql.resources.requests.memory | quote }}
              ephemeral-storage: {{ index .Values.mysql.resources.requests "ephemeral-storage" | quote }}
            limits:
              cpu: {{ .Values.mysql.resources.limits.cpu | quote }}
              memory: {{ .Values.mysql.resources.limits.memory | quote }}
              ephemeral-storage: {{ index .Values.mysql.resources.limits "ephemeral-storage" | quote }}
{{- if not .Values.mysql.persistence.enabled }}
      volumes:
        - name: data
          emptyDir:
            sizeLimit: {{ .Values.mysql.persistence.emptyDir.sizeLimit }}
{{- end }}
{{- if .Values.mysql.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
{{ toYaml .Values.mysql.persistence.accessModes | indent 10 }}
        storageClassName: {{ .Values.mysql.persistence.storageClassName | quote }}
        resources:
          requests:
            storage: {{ .Values.mysql.persistence.size }}
{{- end }}
