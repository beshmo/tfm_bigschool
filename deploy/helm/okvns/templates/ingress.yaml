{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ingress.name }}
  namespace: {{ include "okvns.namespace" . }}
  labels:
    app.kubernetes.io/part-of: {{ include "okvns.partOf" . }}
  annotations:
{{ toYaml .Values.ingress.annotations | indent 4 }}
spec:
{{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
{{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.webPath }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.adminWeb.name }}
                port:
                  number: {{ .Values.adminWeb.service.port }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ingress.name }}-api
  namespace: {{ include "okvns.namespace" . }}
  labels:
    app.kubernetes.io/part-of: {{ include "okvns.partOf" . }}
  annotations:
{{ toYaml .Values.ingress.annotations | indent 4 }}
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
{{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
{{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.apiPath }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.api.name }}
                port:
                  number: {{ .Values.api.service.port }}
{{- end }}
