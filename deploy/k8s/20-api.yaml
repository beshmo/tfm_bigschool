apiVersion: apps/v1
kind: Deployment
metadata:
  name: okvns-api
  namespace: okvns
  labels:
    app.kubernetes.io/name: okvns-api
    app.kubernetes.io/part-of: okvns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: okvns-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: okvns-api
        app.kubernetes.io/part-of: okvns
    spec:
      # Apply the MySQL schema before the API starts serving so readiness can
      # succeed. Migrations are idempotent, so re-running on each pod start is safe.
      initContainers:
        - name: migrate
          image: beshmo/okvns:okvns-api-1.0.0
          imagePullPolicy: IfNotPresent
          command: ['node', 'scripts/migrate.mjs']
          envFrom:
            - configMapRef:
                name: okvns-api-config
          env:
            - name: OKVNS_MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: okvns-mysql-secret
                  key: MYSQL_USER
            - name: OKVNS_MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: okvns-mysql-secret
                  key: MYSQL_PASSWORD
      containers:
        - name: api
          image: beshmo/okvns:okvns-api-1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: okvns-api-config
          env:
            - name: OKVNS_MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: okvns-mysql-secret
                  key: MYSQL_USER
            - name: OKVNS_MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: okvns-mysql-secret
                  key: MYSQL_PASSWORD
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: okvns-api
  namespace: okvns
  labels:
    app.kubernetes.io/name: okvns-api
    app.kubernetes.io/part-of: okvns
spec:
  selector:
    app.kubernetes.io/name: okvns-api
  ports:
    - name: http
      port: 3000
      targetPort: http
