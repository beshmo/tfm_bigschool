# Placeholder ingress. Replace `okvns.example.com` and the ingress class with
# values for your cluster, then uncomment. Requires an ingress controller.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: okvns
  namespace: okvns
  labels:
    app.kubernetes.io/part-of: okvns
  annotations:
    # kubernetes.io/ingress.class: nginx
    okvns.dev/placeholder: 'true'
spec:
  rules:
    - host: okvns.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: okvns-admin-web
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: okvns-api
  namespace: okvns
  labels:
    app.kubernetes.io/part-of: okvns
  annotations:
    # kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: 'true'
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    okvns.dev/placeholder: 'true'
spec:
  rules:
    - host: okvns.example.com
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: okvns-api
                port:
                  number: 3000
