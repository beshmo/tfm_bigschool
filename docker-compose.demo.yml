# Local OKVNS demo stack: demo webapp
#
# Start the demo stack with:
#   docker compose -f docker-compose.demo.yml up --build
#
# The demo app reads entries from the `demo` namespace through @okvns/wrapper.
name: okvns-demo

services:
  demo-web:
    build:
      context: .
      dockerfile: apps/demo-web/Dockerfile
    environment:
      OKVNS_API_BASE_URL: 'http://okvns.beshmo.es/api'
    ports:
      - '8083:8080'
